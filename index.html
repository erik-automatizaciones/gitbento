<!DOCTYPE html>
<html lang="en" data-theme="aurora">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>gitbento — Beautiful GitHub profile cards</title>
  <meta name="description" content="Generate beautiful bento-style GitHub profile cards in seconds. Animated, glassmorphic, free. Download as PNG or embed in your README." />
  <meta name="author" content="gitbento" />
  <meta name="theme-color" content="#0a0a0f" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="gitbento — Beautiful GitHub profile cards" />
  <meta property="og:description" content="Generate beautiful bento-style GitHub profile cards in seconds. Animated, glassmorphic, free." />
  <meta property="og:image" content="assets/og-image.png" />
  <meta property="og:url" content="https://gitbento.vercel.app/" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="gitbento — Beautiful GitHub profile cards" />
  <meta name="twitter:description" content="Generate beautiful bento-style GitHub profile cards in seconds." />
  <meta name="twitter:image" content="assets/og-image.png" />

  <!-- Emoji favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9C%A8</text></svg>" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="themes/aurora.css" />
  <link rel="stylesheet" href="themes/midnight.css" />
  <link rel="stylesheet" href="themes/sunset.css" />
</head>
<body>
  <div class="bg-atmosphere" aria-hidden="true"></div>

  <main id="app" class="app">
    <header class="hero">
      <a class="brand" href="./" aria-label="gitbento home">
        <span class="brand__mark" aria-hidden="true">✨</span>
        <span class="brand__name">gitbento</span>
      </a>

      <h1 class="hero__title">Your GitHub, as a&nbsp;<em>bento</em>.</h1>
      <p class="hero__tagline">
        Generate a beautiful bento-style profile card in seconds.
        Animated, glassmorphic, free.
      </p>

      <form id="gen-form" class="search" autocomplete="off" novalidate>
        <span class="search__at" aria-hidden="true">@</span>
        <input
          id="username"
          class="search__input"
          type="text"
          name="username"
          placeholder="github-username"
          aria-label="GitHub username"
          spellcheck="false"
          autocapitalize="off"
        />
        <button id="generate" class="search__btn" type="submit">
          <span class="search__btn-label">Generate</span>
        </button>
      </form>

      <div class="themes" role="group" aria-label="Theme">
        <button class="theme-dot is-active" type="button" data-theme="aurora" aria-label="Aurora theme" title="Aurora"></button>
        <button class="theme-dot" type="button" data-theme="midnight" aria-label="Midnight theme" title="Midnight"></button>
        <button class="theme-dot" type="button" data-theme="sunset" aria-label="Sunset theme" title="Sunset"></button>
      </div>
    </header>

    <p id="status" class="status" role="status" aria-live="polite"></p>

    <section class="stage" aria-label="Generated card">
      <div id="card" class="card">
        <div class="card__aurora" aria-hidden="true"></div>
        <div id="bento" class="bento">
          <!-- Cells injected by app.js -->
        </div>
        <div class="card__watermark" aria-hidden="true">
          <span class="card__watermark-mark">✦</span> gitbento
        </div>
      </div>

      <div id="actions" class="actions" hidden>
        <button id="download" class="action action--primary" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>Download PNG</span>
        </button>
        <button id="copy" class="action" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span class="action__label">Copy for README</span>
        </button>
      </div>
    </section>

    <footer class="foot">
      <span>No login. No backend. Just your public GitHub data.</span>
      <a class="foot__link" href="https://github.com" target="_blank" rel="noopener noreferrer">Built with the GitHub API</a>
    </footer>
  </main>

  <canvas id="confetti" class="confetti-layer" aria-hidden="true"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
