<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="g1" cx="20%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="60%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#g3)"/>

  <!-- mini bento mock -->
  <g transform="translate(640,120)" opacity="0.95">
    <rect x="0" y="0" width="240" height="240" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="256" y="0" width="184" height="112" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="256" y="128" width="184" height="112" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="0" y="256" width="440" height="120" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="56" cy="60" r="32" fill="#ffffff" fill-opacity="0.14"/>
    <rect x="100" y="44" width="110" height="14" rx="7" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="100" y="70" width="70" height="12" rx="6" fill="#7c3aed"/>
    <rect x="280" y="60" width="70" height="26" rx="8" fill="#ffffff" fill-opacity="0.22"/>
    <rect x="280" y="188" width="70" height="26" rx="8" fill="#ffffff" fill-opacity="0.22"/>
    <rect x="24" y="300" width="120" height="8" rx="4" fill="#3178c6"/>
    <rect x="24" y="322" width="90" height="8" rx="4" fill="#f1e05a"/>
    <rect x="24" y="344" width="60" height="8" rx="4" fill="#e34c26"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(96,250)">
    <text x="0" y="0" font-size="34" fill="#94a3b8" font-weight="600" letter-spacing="2">✨ GITBENTO</text>
    <text x="-4" y="92" font-size="92" font-weight="800" letter-spacing="-3" fill="url(#word)">Your GitHub,</text>
    <text x="-4" y="186" font-size="92" font-weight="800" letter-spacing="-3" fill="#f8fafc">as a bento.</text>
    <text x="0" y="248" font-size="30" fill="#94a3b8" font-weight="500">Beautiful profile cards in seconds — free.</text>
  </g>
</svg>
